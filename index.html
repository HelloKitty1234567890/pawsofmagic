<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paws of Magic</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #a8d8ff;
      font-family: sans-serif;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      text-shadow: 2px 2px 3px rgba(0,0,0,0.6);
      font-size: 18px;
      pointer-events: none;
      z-index: 10;
    }
    #storyBox {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 20, 50, 0.9);
      color: white;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 20px;
      max-width: 500px;
      text-align: center;
      display: none;
      z-index: 10;
      border: 3px solid #ffd76a;
    }
    #pickScreen {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #2b1055, #7597de);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: white;
      text-align: center;
    }
    #pickScreen h1 {
      font-size: 2.4em;
      margin-bottom: 30px;
    }
    .pickBtn {
      font-size: 1.4em;
      padding: 20px 40px;
      margin: 12px;
      border-radius: 20px;
      border: 4px solid #ffd76a;
      background: white;
      cursor: pointer;
      font-weight: bold;
    }
    .pickBtn:hover {
      background: #ffd76a;
    }
  </style>
</head>
<body>
  <div id="pickScreen">
    <h1>🐾 Paws of Magic ✨</h1>
    <p>Who do you want to be?</p>
    <div>
      <button class="pickBtn" id="pickCat">🐱 Cat</button>
      <button class="pickBtn" id="pickDog">🐶 Dog</button>
    </div>
  </div>
  <div id="ui" style="display:none">🐾 WASD/ARROWS to move, SPACE to jump<br>Drag the mouse to look around. Climb the tree!</div>
  <div id="storyBox"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ---------- Basic setup ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa8d8ff);
    scene.fog = new THREE.Fog(0xa8d8ff, 30, 120);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- Lights ----------
    const sun = new THREE.DirectionalLight(0xfff2d0, 1.1);
    sun.position.set(30, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -60;
    sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60;
    sun.shadow.camera.bottom = -60;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    // ---------- Ground ----------
    const groundGeo = new THREE.CircleGeometry(80, 48);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x5fae4e });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ---------- The Big Tree (trunk + climbable platforms spiraling up) ----------
    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8a5a34 });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(3, 4.5, 70, 16), trunkMat);
    trunk.position.y = 35;
    trunk.castShadow = true;
    trunk.receiveShadow = true;
    treeGroup.add(trunk);

    // Leaf materials - a few shades of green for a fuller, less flat look
    const leafMats = [
      new THREE.MeshStandardMaterial({ color: 0x3f8f3f }),
      new THREE.MeshStandardMaterial({ color: 0x2f7a2f }),
      new THREE.MeshStandardMaterial({ color: 0x59a84f })
    ];
    function randLeafMat() { return leafMats[Math.floor(Math.random() * leafMats.length)]; }

    function addLeafCluster(x, y, z, size) {
      const blobCount = 4 + Math.floor(Math.random() * 3);
      for (let i = 0; i < blobCount; i++) {
        const blob = new THREE.Mesh(new THREE.SphereGeometry(size * (0.6 + Math.random() * 0.5), 12, 12), randLeafMat());
        blob.position.set(
          x + (Math.random() - 0.5) * size * 1.4,
          y + (Math.random() - 0.5) * size * 1.2,
          z + (Math.random() - 0.5) * size * 1.4
        );
        blob.castShadow = true;
        treeGroup.add(blob);
      }
    }

    // Big branches poking out from the trunk, each ending in a leaf cluster
    const branchMat = new THREE.MeshStandardMaterial({ color: 0x7a4f2c });
    const branches = [];
    const numBranches = 9;
    for (let i = 0; i < numBranches; i++) {
      const angle = i * 2.4 + Math.random() * 0.5;
      const height = 20 + i * 5.5;
      const length = 9 + Math.random() * 4;
      const tilt = 0.5 + Math.random() * 0.35;

      const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.85, length, 8), branchMat);
      branch.castShadow = true;
      // Position branch so one end touches the trunk, other end sticks outward/upward
      branch.position.set(Math.cos(angle) * 2.5, height, Math.sin(angle) * 2.5);
      branch.rotation.z = Math.cos(angle) * tilt;
      branch.rotation.x = -Math.sin(angle) * tilt;
      branch.translateY(length / 2);
      treeGroup.add(branch);
      branches.push(branch);

      // Leaf cluster at the tip of the branch
      const tipX = Math.cos(angle) * (2.5 + Math.sin(tilt) * length);
      const tipZ = Math.sin(angle) * (2.5 + Math.sin(tilt) * length);
      const tipY = height + Math.cos(tilt) * length;
      addLeafCluster(tipX, tipY, tipZ, 5 + Math.random() * 2);
    }

    // Big leafy crown at the very top
    for (let i = 0; i < 3; i++) {
      addLeafCluster(0, 68 + i * 5, 0, 12 - i * 2);
    }

    // Platforms spiraling around the trunk, going up
    const platforms = [];
    const platformMat = new THREE.MeshStandardMaterial({ color: 0xa8763e });
    const numPlatforms = 16;
    for (let i = 0; i < numPlatforms; i++) {
      const angle = i * 0.9;
      const height = 3 + i * 4;
      const radius = 5.5;
      const plat = new THREE.Mesh(new THREE.CylinderGeometry(2.6, 2.6, 0.6, 12), platformMat);
      plat.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
      plat.castShadow = true;
      plat.receiveShadow = true;
      treeGroup.add(plat);
      platforms.push(plat);
    }

    // ---------- Characters to meet (simple colorful critters sitting on some platforms) ----------
    const storyBox = document.getElementById('storyBox');
    const characters = [];
    const characterData = [
      { color: 0xff6f91, name: 'Whisker the Firefly Sprite', line: '"Ooh, a climber! Keep going, the view gets better!"' },
      { color: 0xffc75f, name: 'Old Barkclaw', line: '"I have lived in this tree for 100 years. You remind me of myself, young one."' },
      { color: 0x845ec2, name: 'Glimmer the Moth Witch', line: '"Careful up here... but magic favors the brave."' },
      { color: 0x2c73d2, name: 'Pip the Acorn Guardian', line: '"You are almost to the top! Just a little further, paw-friend."' }
    ];
    const charPlatformIndexes = [3, 7, 11, 14];

    charPlatformIndexes.forEach((platIdx, i) => {
      const data = characterData[i];
      const plat = platforms[platIdx];
      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 12, 12),
        new THREE.MeshStandardMaterial({ color: data.color })
      );
      body.position.set(plat.position.x, plat.position.y + 1.1, plat.position.z);
      body.castShadow = true;
      body.userData = { name: data.name, line: data.line };
      treeGroup.add(body);
      characters.push(body);
    });

    // ---------- Player (magic cat or dog = simple stylized shapes) ----------
    function makePet(kind) {
      const group = new THREE.Group();
      const color = kind === 'dog' ? 0xc98a4b : 0xff9a3c;
      const mat = new THREE.MeshStandardMaterial({ color });

      const body = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16), mat);
      body.scale.set(1, 0.85, 1.3);
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 16), mat);
      head.position.set(0, 0.4, 1.1);
      head.castShadow = true;
      group.add(head);

      if (kind === 'dog') {
        // Floppy dog ears
        [-0.35, 0.35].forEach(x => {
          const ear = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), mat);
          ear.scale.set(0.6, 1.3, 0.4);
          ear.position.set(x, 0.25, 1.15);
          ear.rotation.z = x > 0 ? -0.4 : 0.4;
          group.add(ear);
        });
        // Snout
        const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.5, 10), mat);
        snout.rotation.x = Math.PI / 2;
        snout.position.set(0, 0.25, 1.6);
        group.add(snout);
        // Wagging tail (up, curled)
        const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 1.0, 8), mat);
        tail.position.set(0, 0.5, -1.1);
        tail.rotation.x = -Math.PI / 3;
        tail.name = 'tail';
        group.add(tail);
      } else {
        // Pointy cat ears
        [-0.25, 0.25].forEach(x => {
          const ear = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.35, 8), mat);
          ear.position.set(x, 0.85, 1.1);
          group.add(ear);
        });
        // Long cat tail
        const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 1.3, 8), mat);
        tail.position.set(0, 0.3, -1.2);
        tail.rotation.x = Math.PI / 3;
        tail.name = 'tail';
        group.add(tail);
      }

      return group;
    }

    let cat = null; // the player's pet group (kept name "cat" for the rest of the game logic)

    document.getElementById('pickCat').addEventListener('click', () => startGame('cat'));
    document.getElementById('pickDog').addEventListener('click', () => startGame('dog'));

    function startGame(kind) {
      cat = makePet(kind);
      cat.position.set(0, 1, 12);
      scene.add(cat);
      document.getElementById('pickScreen').style.display = 'none';
      document.getElementById('ui').style.display = 'block';
      animate();
    }

    // ---------- Controls ----------
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // ---------- Camera drag-to-look ----------
    let camYaw = 0;
    let camPitch = 0.35;
    let dragging = false;
    let lastMouseX = 0, lastMouseY = 0;

    renderer.domElement.addEventListener('mousedown', e => {
      dragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    window.addEventListener('mouseup', () => { dragging = false; });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      camYaw -= dx * 0.006;
      camPitch += dy * 0.004;
      camPitch = Math.max(0.08, Math.min(1.2, camPitch));
    });

    // touch support (drag with one finger)
    renderer.domElement.addEventListener('touchstart', e => {
      dragging = true;
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;
    });
    window.addEventListener('touchend', () => { dragging = false; });
    window.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - lastMouseX;
      const dy = e.touches[0].clientY - lastMouseY;
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;
      camYaw -= dx * 0.006;
      camPitch += dy * 0.004;
      camPitch = Math.max(0.08, Math.min(1.2, camPitch));
    });

    let velocityY = 0;
    let onGround = true;
    const gravity = -0.028;
    const jumpPower = 0.55;
    const moveSpeed = 0.14;

    let lastMessageTime = -10;

    function checkPlatformCollision() {
      onGround = false;
      // ground plane
      if (cat.position.y <= 1) {
        cat.position.y = 1;
        velocityY = 0;
        onGround = true;
      }
      // tree platforms
      for (const plat of platforms) {
        const dx = cat.position.x - plat.position.x;
        const dz = cat.position.z - plat.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const platTop = plat.position.y + 0.3;
        if (dist < 2.6 && velocityY <= 0 && cat.position.y - 1 <= platTop && cat.position.y - 1 >= platTop - 1.2) {
          cat.position.y = platTop + 1;
          velocityY = 0;
          onGround = true;
        }
      }
    }

    function checkCharacterMeet() {
      for (const c of characters) {
        const dist = cat.position.distanceTo(c.position);
        if (dist < 2.2) {
          const now = performance.now();
          if (now - lastMessageTime > 3000) {
            lastMessageTime = now;
            storyBox.style.display = 'block';
            storyBox.innerHTML = `<b>${c.userData.name}</b><br>${c.userData.line}`;
            setTimeout(() => { storyBox.style.display = 'none'; }, 3000);
          }
        }
      }
    }

    // ---------- Camera follow (orbits around the pet, drag mouse to look) ----------
    const camDistance = 9;
    function updateCamera() {
      const offset = new THREE.Vector3(
        Math.sin(camYaw) * camDistance * Math.cos(camPitch),
        camDistance * Math.sin(camPitch) + 2,
        Math.cos(camYaw) * camDistance * Math.cos(camPitch)
      );
      const desired = cat.position.clone().add(offset);
      camera.position.lerp(desired, 0.15);
      camera.lookAt(cat.position.x, cat.position.y + 1, cat.position.z);
    }

    // ---------- Game loop ----------
    function animate() {
      requestAnimationFrame(animate);
      if (!cat) return;

      // Move relative to the camera's facing direction
      let inputX = 0, inputZ = 0;
      if (keys['ArrowUp'] || keys['KeyW']) inputZ -= 1;
      if (keys['ArrowDown'] || keys['KeyS']) inputZ += 1;
      if (keys['ArrowLeft'] || keys['KeyA']) inputX -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) inputX += 1;

      if (inputX !== 0 || inputZ !== 0) {
        const len = Math.sqrt(inputX * inputX + inputZ * inputZ);
        inputX /= len; inputZ /= len;

        const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
        const right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
        const move = new THREE.Vector3();
        move.addScaledVector(forward, inputZ);
        move.addScaledVector(right, inputX);
        move.normalize();

        cat.position.x += move.x * moveSpeed;
        cat.position.z += move.z * moveSpeed;
        const targetAngle = Math.atan2(move.x, move.z);
        cat.rotation.y += (targetAngle - cat.rotation.y) * 0.2;
      }

      if (keys['Space'] && onGround) {
        velocityY = jumpPower;
        onGround = false;
      }

      velocityY += gravity;
      cat.position.y += velocityY;

      checkPlatformCollision();
      checkCharacterMeet();
      updateCamera();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
